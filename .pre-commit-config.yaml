# Local pre-commit hooks (complements ops/git-hooks/pre-push for full gates).
# Install: pip install pre-commit && pre-commit install
# Or use ops/git-hooks via: git config core.hooksPath ops/git-hooks
repos:
  - repo: local
    hooks:
      - id: qesto-typecheck
        name: TypeScript check
        entry: npm run typecheck
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: qesto-secret-scan
        name: Secret scan (advisory)
        entry: bash ops/ci/secret-scan.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
