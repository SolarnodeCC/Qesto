<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Fonts: warm both Google Fonts origins early and load the brand-font CSS in
         parallel with the app bundle. Loading the stylesheet here (rather than via
         @import in src/styles.css) avoids a render-blocking request chain that would
         otherwise delay text LCP — the browser would have to download styles.css,
         then discover the font URL, then connect. preconnect + <link> warms the
         connection up front. display=swap renders fallback text immediately (no FOIT).
         CSP in public/_headers already allows fonts.googleapis.com / fonts.gstatic.com. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <meta name="theme-color" content="#0D9488" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B1220" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Qesto — feel the pulse of the room, amplified by AI." />
    <!-- AI Training Protection: Prevent images from being used to train AI models -->
    <meta name="robots" content="noimageai" />
    <!-- Bing Webmaster Tools verification -->
    <meta name="msvalidate.01" content="23CACFDE3A88A7D1C1C76D8D91C561D2" />
    <title>Qesto</title>
    <!-- Appearance bootstrap: apply stored theme / density / high-contrast to <html>
         before first paint to avoid a flash. Mirrors useColorScheme + useDensity +
         HighContrastToggle, which re-assert these once React mounts. -->
    <script>
      (function () {
        try {
          var el = document.documentElement
          var pref = localStorage.getItem('qesto:color-scheme')
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          el.dataset.theme = resolved
          el.dataset.themePreference =
            pref === 'light' || pref === 'dark' || pref === 'system' ? pref : 'system'
          var den = localStorage.getItem('qesto-density')
          el.dataset.density =
            den === 'compact' || den === 'comfortable' || den === 'spacious' ? den : 'comfortable'
          el.dataset.highContrast =
            localStorage.getItem('qesto:high-contrast') === '1' ? 'true' : 'false'
        } catch (e) {
          /* localStorage unavailable — hooks will set these on mount */
        }
      })()
    </script>
    <!-- Microsoft Clarity (project x06dypkbyr) is loaded lazily after cookie consent.
         See src/lib/clarity.ts + src/components/CookieConsentBanner.tsx. The CSP in
         public/_headers whitelists clarity.ms / c.bing.com for when it loads. -->
  </head>
  <body class="bg-surface text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
