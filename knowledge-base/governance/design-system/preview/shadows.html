<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { background: #FAFAFA; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { aspect-ratio: 1/1; background: #FFF; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
  .tile b { font-size: 12px; }
  .tile span { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
<div class="kicker">Shadows / elevation</div>
<div class="grid">
  <div class="tile" style="box-shadow: 0 2px 8px rgba(10,15,30,0.06)"><b>card</b><span>rest state</span></div>
  <div class="tile" style="box-shadow: 0 8px 24px rgba(10,15,30,0.10)"><b>elevated</b><span>hover / modal</span></div>
  <div class="tile" style="box-shadow: 0 4px 20px rgba(20,184,166,0.25)"><b>teal</b><span>CTA hover</span></div>
  <div class="tile" style="box-shadow: 0 4px 20px rgba(139,92,246,0.25)"><b>ai</b><span>AI surface</span></div>
  <div class="tile" style="box-shadow: 0 0 0 3px rgba(20,184,166,0.4)"><b>focus-ring</b><span>keyboard</span></div>
</div>
