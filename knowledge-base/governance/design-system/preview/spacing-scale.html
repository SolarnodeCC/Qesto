<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .card{width:660px;padding:24px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--teal-500);border-radius:3px}
  .n{font-family:var(--font-mono);font-size:11px;color:var(--pulse-500)}
  .label{font-size:11px;color:var(--pulse-500);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:14px}
</style></head>
<body><div class="card">
<div class="label">Spacing · 4px baseline</div>
<div class="grid">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><span class="n">1 · 4</span></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><span class="n">2 · 8</span></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><span class="n">3 · 12</span></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><span class="n">4 · 16</span></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><span class="n">5 · 24</span></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><span class="n">6 · 32</span></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><span class="n">8 · 48</span></div>
  <div class="cell"><div class="box" style="width:64px;height:64px"></div><span class="n">10 · 64</span></div>
  <div class="cell"><div class="box" style="width:96px;height:96px"></div><span class="n">12 · 96</span></div>
</div>
</div></body></html>
