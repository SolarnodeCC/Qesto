<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .card{width:660px;padding:24px}
  .swatch{border-radius:var(--radius-md);height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-weight:500;font-family:var(--font-mono);box-shadow:inset 0 0 0 1px rgba(10,15,30,0.05)}
  .swatch.lt{color:var(--pulse-900)}
  .swatch .hex{opacity:.85}
  .grid5{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .label{font-size:11px;color:var(--pulse-500);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
</style></head>
<body><div class="card">
<div class="label">Pulse · Neutral ramp</div>
<div class="grid5">
  <div class="swatch lt" style="background:#FAFAFA"><span>50</span><span class="hex">FAFAFA</span></div>
  <div class="swatch lt" style="background:#F5F5F5"><span>100</span><span class="hex">F5F5F5</span></div>
  <div class="swatch lt" style="background:#E5E5E5"><span>200</span><span class="hex">E5E5E5</span></div>
  <div class="swatch lt" style="background:#D4D4D4"><span>300</span><span class="hex">D4D4D4</span></div>
  <div class="swatch lt" style="background:#A3A3A3"><span>400</span><span class="hex">A3A3A3</span></div>
  <div class="swatch" style="background:#737373"><span>500</span><span class="hex">737373</span></div>
  <div class="swatch" style="background:#525252"><span>600</span><span class="hex">525252</span></div>
  <div class="swatch" style="background:#404040"><span>700</span><span class="hex">404040</span></div>
  <div class="swatch" style="background:#262626"><span>800</span><span class="hex">262626</span></div>
  <div class="swatch" style="background:#0A0F1E"><span>900</span><span class="hex">0A0F1E</span></div>
</div>
</div></body></html>
