<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .card{width:660px;padding:24px}
  .swatch{border-radius:var(--radius-md);height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-weight:500;font-family:var(--font-mono);box-shadow:inset 0 0 0 1px rgba(10,15,30,0.05)}
  .swatch.lt{color:var(--pulse-900)}
  .swatch .hex{opacity:.85}
  .grid5{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .label{font-size:11px;color:var(--pulse-500);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
</style></head>
<body><div class="card">
<div class="label">Violet · AI accent</div>
<div class="grid5">
  <div class="swatch lt" style="background:#F5F3FF"><span>50</span><span class="hex">F5F3FF</span></div>
  <div class="swatch lt" style="background:#EDE9FE"><span>100</span><span class="hex">EDE9FE</span></div>
  <div class="swatch lt" style="background:#DDD6FE"><span>200</span><span class="hex">DDD6FE</span></div>
  <div class="swatch lt" style="background:#C4B5FD"><span>300</span><span class="hex">C4B5FD</span></div>
  <div class="swatch" style="background:#A78BFA"><span>400</span><span class="hex">A78BFA</span></div>
  <div class="swatch" style="background:#8B5CF6"><span>500</span><span class="hex">8B5CF6</span></div>
  <div class="swatch" style="background:#7C3AED"><span>600</span><span class="hex">7C3AED</span></div>
  <div class="swatch" style="background:#6D28D9"><span>700</span><span class="hex">6D28D9</span></div>
  <div class="swatch" style="background:#5B21B6"><span>800</span><span class="hex">5B21B6</span></div>
  <div class="swatch" style="background:#4C1D95"><span>900</span><span class="hex">4C1D95</span></div>
</div>
</div></body></html>
