<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .rcards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .rcards > div { aspect-ratio: 1/1; background: linear-gradient(135deg, #F0FDFA, #F5F3FF); box-shadow: inset 0 0 0 1px #E5E5E5; display: flex; align-items: flex-end; padding: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); flex-direction: column; justify-content: space-between; }
  .rcards b { font-family: var(--font-body); color: var(--text-primary); font-size: 12px; }
</style>
<div class="kicker">Corner radii</div>
<div class="rcards">
  <div style="border-radius:6px"><b>sm</b><span>6 · chips</span></div>
  <div style="border-radius:10px"><b>md</b><span>10 · buttons</span></div>
  <div style="border-radius:16px"><b>lg</b><span>16 · cards</span></div>
  <div style="border-radius:24px"><b>xl</b><span>24 · hero/modal</span></div>
  <div style="border-radius:9999px"><b>pill</b><span>∞ · badges</span></div>
</div>
