      ['Settings', this._anonLabel(s.anonymity) + ' · ' + (s.votePolicy === 'once' ? 'One vote' : s.votePolicy === 'multi' ? 'Multiple votes' : 'Reactions'), 4],
    ]
    return R.createElement(React.Fragment, null,
      R.createElement('p', { style: { fontSize: 14, fontWeight: 500, margin: 0, color: 'var(--text-primary)' } }, 'Overview & launch'),
      rows.map(([label, val, step]) => R.createElement('div', { key: label, style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, padding: '12px 14px', borderRadius: 'var(--radius-md)', border: '1px solid var(--surface-border)' } },
        R.createElement('div', { style: { minWidth: 0 } },
          R.createElement('p', { style: { fontSize: 11.5, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--text-muted)', margin: 0 } }, label),
          R.createElement('p', { style: { fontSize: 14, color: 'var(--text-primary)', margin: '3px 0 0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, val)),
        R.createElement('button', { onClick: () => this.setState({ step }), style: { background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 600, color: 'var(--teal-600)', flexShrink: 0 } }, 'Edit'))),
      R.createElement('p', { style: { fontSize: 12, color: 'var(--text-muted)', margin: '4px 0 0', lineHeight: 1.5 } }, 'By launching the session you agree to the privacy statement. Answers are processed in accordance with your anonymity settings.'))
  }
  _anonLabel(a) { return { full: 'Fully anonymous', partial: 'Partial', none: 'Not anonymous', zero_knowledge: 'Zero-knowledge' }[a] }

  // ── Footer ──
  _footer(R, NS) {
    const { Button } = NS
    const s = this.state
    const canNext = s.step === 1 ? (s.title.trim() && s.goal.trim()) : s.step === 2 ? (s.mode !== 'idle' && s.questions.filter(q => !q.dismissed).length > 0) : true
    return R.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, padding: '14px 24px', borderTop: '1px solid var(--surface-border)', flexShrink: 0 } },
      s.step > 1 ? R.createElement(Button, { variant: 'ghost', onClick: () => this.setState(p => ({ step: p.step - 1 })) }, 'Back') : R.createElement('span', null),
      s.step < 5
        ? R.createElement(Button, { onClick: () => canNext && this.setState(p => ({ step: p.step + 1 })), disabled: !canNext, iconRight: this._icon(R, 'arrow-right', 15) }, 'Next')
        : R.createElement(Button, { iconLeft: this._icon(R, 'rocket', 15) }, 'Start session'))
  }
}
