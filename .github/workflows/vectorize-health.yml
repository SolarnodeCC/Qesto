name: Vectorize Health

# Read-only visibility into the live Vectorize indexes (qesto-kb-production,
# qesto-help, qesto-decisions). `npm run kb:health` prints each index's live
# dimension and vector count and FAILS if the KB index is empty while KB files
# exist, or a dimension != bge-m3 (1024) — i.e. retrieval is silently broken.
# Runs weekly and on demand; complements the per-merge gates in
# kb-sync-on-merge.yml and help-sync-on-merge.yml.

on:
  schedule:
    # Mondays 06:00 UTC — a few hours after the worker's Sunday 03:00 cron watchdog.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: vectorize-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vectorize health (live dimensions + counts)
        run: npm run kb:health
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
