name: Help Docs Sync on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge-base/help/**'
      - 'scripts/sync-help-docs.ts'
      - '.github/workflows/help-sync-on-merge.yml'

permissions:
  contents: read

concurrency:
  group: help-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  help-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The secrets context is not allowed in step `if:` expressions — map the
    # webhook into job env so the Slack step can gate on `env.*` instead.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Help Sync
        run: bash ops/ci/help-sync.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      # Surface live index dimensions/vector counts after the sync and fail if an
      # index is empty-while-files-exist or mis-dimensioned (retrieval broken).
      - name: Vectorize health gate
        run: |
          # Vectorize upserts are eventually consistent — let them settle first.
          sleep 30
          npm run kb:health
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload sync manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: help-sync-manifest
          path: .help-sync-manifest.json
          retention-days: 30

      - name: Notify Slack (on failure)
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3
        with:
          payload: |
            {
              "text": "❌ Help Docs Sync Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Help Docs Sync Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nWorkflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
