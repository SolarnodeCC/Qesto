name: KB Sync on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge-base/**'
      - 'scripts/kb-sync-cli.ts'
      - 'scripts/embed-kb.ts'
      - 'scripts/kb-health.ts'
      - '.github/workflows/kb-sync-on-merge.yml'

permissions:
  contents: read
  issues: read

concurrency:
  group: kb-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kb-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run KB Sync
        run: bash ops/ci/kb-sync.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          KB_ADMIN_KEY: ${{ secrets.KB_ADMIN_KEY }}

      # The sync above is advisory (it never fails the job). This gate is the
      # real pass/fail signal: it fails the workflow if the live KB index is
      # empty while KB files exist, or its dimensions don't match the embed
      # model — i.e. retrieval is broken. (deps already installed by kb-sync.sh)
      - name: KB health gate
        run: |
          # Vectorize upserts are eventually consistent — let them settle
          # before asserting the index is populated and dimensionally correct.
          sleep 30
          npm run kb:health
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload sync manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kb-sync-manifest
          path: .kb-sync-manifest.json
          retention-days: 30

      - name: Comment on PR (if failure)
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ KB sync/health gate failed — the live KB vector index may be empty, stale, or dimensionally mismatched. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })

      - name: Notify Slack (on failure)
        if: failure()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3
        with:
          payload: |
            {
              "text": "❌ KB Sync / Health Gate Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*KB Sync / Health Gate Failed*\nThe live KB vector index may be empty, stale, or dimensionally mismatched.\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nWorkflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
