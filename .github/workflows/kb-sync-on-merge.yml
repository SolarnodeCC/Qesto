name: KB Sync on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge-base/**'
      - 'scripts/kb-sync-cli.ts'
      - 'scripts/embed-kb.ts'
      - 'scripts/kb-health.ts'
      - '.github/workflows/kb-sync-on-merge.yml'

permissions:
  contents: read
  issues: read
  actions: read # read prior run artifacts to restore the sync manifest

concurrency:
  group: kb-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kb-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The secrets context is not allowed in step `if:` expressions — map the
    # webhook into job env so the Slack step can gate on `env.*` instead.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      contents: read
      issues: read
      actions: read # read prior run artifacts to restore the sync manifest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      # The sync manifest (.kb-sync-manifest.json) holds per-file hashes + vector
      # ids from the last sync — the state that lets this run detect changed AND
      # deleted docs. It is runtime state (not committed), so restore it from the
      # most recent successful run's artifact. Missing/empty is safe: the sync
      # then treats every file as new and prunes nothing.
      - name: Restore previous sync manifest
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list --workflow kb-sync-on-merge.yml --branch main \
            --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)
          if [ -n "$run_id" ]; then
            echo "Restoring manifest from run $run_id"
            gh run download "$run_id" -n kb-sync-manifest --dir . \
              || echo "No manifest artifact on run $run_id — starting fresh."
          else
            echo "No previous successful run — starting with an empty manifest."
          fi

      - name: Run KB Sync
        run: bash ops/ci/kb-sync.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          KB_ADMIN_KEY: ${{ secrets.KB_ADMIN_KEY }}

      # The sync above is advisory (it never fails the job). This gate is the
      # real pass/fail signal: it fails the workflow if the live KB index is
      # empty while KB files exist, or its dimensions don't match the embed
      # model — i.e. retrieval is broken. (deps already installed by kb-sync.sh)
      - name: KB health gate
        run: |
          # Vectorize upserts are eventually consistent — let them settle
          # before asserting the index is populated and dimensionally correct.
          sleep 30
          npm run kb:health
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload sync manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kb-sync-manifest
          path: .kb-sync-manifest.json
          retention-days: 30

      - name: Comment on PR (if failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ KB sync/health gate failed — the live KB vector index may be empty, stale, or dimensionally mismatched. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })

      - name: Notify Slack (on failure)
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3
        with:
          payload: |
            {
              "text": "❌ KB Sync / Health Gate Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*KB Sync / Health Gate Failed*\nThe live KB vector index may be empty, stale, or dimensionally mismatched.\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nWorkflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
