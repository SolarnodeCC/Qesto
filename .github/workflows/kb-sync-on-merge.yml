name: KB Sync on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge-base/**'
      - 'scripts/kb-sync-cli.ts'
      - 'scripts/embed-kb.ts'
      - '.github/workflows/kb-sync-on-merge.yml'

permissions:
  contents: read
  issues: read

concurrency:
  group: kb-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kb-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout code
        uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run KB Sync
        run: npm run kb:sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          KB_ADMIN_KEY: ${{ secrets.KB_ADMIN_KEY }}

      - name: Upload sync manifest
        if: always()
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        with:
          name: kb-sync-manifest
          path: .kb-sync-manifest.json
          retention-days: 30

      - name: Comment on PR (if failure)
        if: failure()
        uses: actions/github-script@26bd3ccac1ea39a8c1a44d160589c9dc8b4fb53a
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ KB sync failed. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })

      - name: Notify Slack (on failure)
        if: failure()
        uses: slackapi/slack-github-action@d4dd44128e9be7d7df6514ab9075da67d26d36e8
        with:
          payload: |
            {
              "text": "❌ KB Sync Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*KB Sync Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\nWorkflow: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
