name: Playwright Tests
on:
  push:
    branches: [ main ]
    # Only run the (expensive) E2E suite when app code or the E2E harness changes;
    # docs/KB merges skip it entirely.
    paths:
      - 'src/**'
      - 'functions/**'
      - 'worker/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright.yml'

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chrome --with-deps
    - name: Build app
      run: npm run build
    - name: Apply local D1 schema and migrations
      # --local writes to a local SQLite file; no Cloudflare token needed.
      run: npm run e2e:db:local
    - name: Start full-stack Pages dev server
      run: |
        npm run e2e:serve:fullstack > wrangler-pages-dev.log 2>&1 &
        echo $! > wrangler-pages-dev.pid
        for i in {1..60}; do
          if curl --fail --silent --max-time 5 http://localhost:8788/ > /dev/null; then
            exit 0
          fi
          sleep 2
        done
        cat wrangler-pages-dev.log
        exit 1
      # No CLOUDFLARE_API_TOKEN — forces wrangler into fully local mode so it
      # doesn't hang trying to reach remote-only bindings (AI, Vectorize, DOs).
      env:
        WRANGLER_SEND_METRICS: 'false'
    - name: Run Playwright tests
      run: npm run test:e2e:fullstack
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:8788
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/artifacts/playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ failure() }}
      with:
        name: wrangler-pages-dev-log
        path: wrangler-pages-dev.log
        retention-days: 7
