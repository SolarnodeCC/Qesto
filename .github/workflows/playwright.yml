name: Playwright Tests
on:
  push:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chrome --with-deps
    - name: Build app
      run: npm run build
    - name: Apply local D1 schema and migrations
      run: npm run e2e:db:local
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    - name: Start full-stack Pages dev server
      run: |
        npm run e2e:serve:fullstack > wrangler-pages-dev.log 2>&1 &
        echo $! > wrangler-pages-dev.pid
        for i in {1..60}; do
          if curl --fail --silent http://localhost:8788/ > /dev/null; then
            exit 0
          fi
          sleep 2
        done
        cat wrangler-pages-dev.log
        exit 1
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    - name: Run Playwright tests
      run: npm run test:e2e:fullstack
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/artifacts/playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: ${{ failure() }}
      with:
        name: wrangler-pages-dev-log
        path: wrangler-pages-dev.log
        retention-days: 7
