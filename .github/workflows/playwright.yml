name: Playwright Tests
on:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chrome --with-deps
    - name: Build app
      run: npm run build
    - name: Apply local D1 schema and migrations
      # --local writes to a local SQLite file; no Cloudflare token needed.
      run: npm run e2e:db:local
    - name: Start full-stack Pages dev server
      run: |
        npm run e2e:serve:fullstack > wrangler-pages-dev.log 2>&1 &
        echo $! > wrangler-pages-dev.pid
        for i in {1..60}; do
          if curl --fail --silent --max-time 5 http://localhost:8788/ > /dev/null; then
            exit 0
          fi
          sleep 2
        done
        cat wrangler-pages-dev.log
        exit 1
      # No CLOUDFLARE_API_TOKEN — forces wrangler into fully local mode so it
      # doesn't hang trying to reach remote-only bindings (AI, Vectorize, DOs).
      env:
        WRANGLER_SEND_METRICS: 'false'
    - name: Run Playwright tests
      run: npm run test:e2e:fullstack
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/artifacts/playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ failure() }}
      with:
        name: wrangler-pages-dev-log
        path: wrangler-pages-dev.log
        retention-days: 7
