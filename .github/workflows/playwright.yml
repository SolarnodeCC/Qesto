name: Playwright Tests
on:
  push:
    branches: [ main, master ]

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31
    - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
      with:
        node-version: '20'
        cache: 'npm'
    - name: Run Playwright lane
      run: bash ops/ci/playwright.sh
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    - uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: tests/artifacts/playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
      if: ${{ failure() }}
      with:
        name: wrangler-pages-dev-log
        path: wrangler-pages-dev.log
        retention-days: 7
