name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: quality-gates · audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Pin to full commit SHA — tag refs can change without review
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      # Quality gates — runs local quality-gates.sh script
      - name: Run quality gates
        run: bash ops/ci/quality-gates.sh

      - name: Check migration numbers (no duplicates)
        run: bash ops/ci/check-migration-numbers.sh

      - name: Contracts drift check
        run: bash ops/ci/contracts.sh

      # Upload audit artifacts for agent repair routing
      - name: Upload audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-results
          path: |
            agent/repo-score.json
            agent/repo-score.md
          retention-days: 30

      # Upload coverage artifacts
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # #535: validate against staging before any production deploy. Production is
  # gated on this job succeeding (incl. its health check), so a broken build or
  # broken bindings are caught in staging instead of in front of live users.
  deploy-staging:
    name: deploy · staging
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build (staging)
        run: npm run build
        env:
          VITE_API_BASE_URL: https://staging.qesto.cc
          VITE_SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
          VITE_CHECKOUT_URL: ${{ secrets.CHECKOUT_URL }}

      - name: Deploy to Cloudflare Pages (staging)
        run: npx wrangler pages deploy dist --project-name=qesto-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify staging API health
        run: |
          echo "Checking staging API health endpoints..."
          health=$(curl -sf https://staging.qesto.cc/api/admin/health)
          d1_ok=$(echo "$health" | jq -r '.d1')
          kv_ok=$(echo "$health" | jq -r '.kv')
          do_ok=$(echo "$health" | jq -r '.do')
          echo "D1: $d1_ok, KV: $kv_ok, DO: $do_ok"
          if [ "$d1_ok" != "ok" ] || [ "$kv_ok" != "ok" ] || [ "$do_ok" != "ok" ]; then
            echo "ERROR: staging health check failed — blocking production deploy"
            exit 1
          fi
          echo "✓ Staging healthy"

  build:
    name: build · deploy
    needs: [ci, deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc
          # Keep in sync with SUPERUSER_EMAIL and CHECKOUT_URL runtime vars on Cloudflare Pages.
          VITE_SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
          VITE_CHECKOUT_URL: ${{ secrets.CHECKOUT_URL }}

      - name: Get commit SHA
        id: sha
        run: printf 'sha=%s\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}

      - name: Purge Cloudflare cache
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Verify deploy (commit parity + asset MIME types)
        run: node scripts/verify-deploy.mjs https://qesto.cc
        env:
          GITHUB_SHA: ${{ github.sha }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Verify API health
        run: |
          echo "Checking API health endpoints..."
          health=$(curl -sf https://qesto.cc/api/admin/health)

          # Verify all systems are operational
          d1_ok=$(echo "$health" | jq -r '.d1')
          kv_ok=$(echo "$health" | jq -r '.kv')
          do_ok=$(echo "$health" | jq -r '.do')

          echo "D1: $d1_ok, KV: $kv_ok, DO: $do_ok"

          if [ "$d1_ok" != "ok" ] || [ "$kv_ok" != "ok" ] || [ "$do_ok" != "ok" ]; then
            echo "ERROR: API health check failed"
            exit 1
          fi

          echo "✓ All API systems healthy"
