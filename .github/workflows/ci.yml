name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: quality-gates · audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Pin to full commit SHA — tag refs can change without review
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      # Quality gates — runs local quality-gates.sh script
      - name: Run quality gates
        run: bash ops/ci/quality-gates.sh

      - name: Contracts drift check
        run: bash ops/ci/contracts.sh

      # Upload audit artifacts for agent repair routing
      - name: Upload audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-results
          path: |
            agent/repo-score.json
            agent/repo-score.md
          retention-days: 30

      # Upload coverage artifacts
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build · deploy
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc
          # Keep in sync with SUPERUSER_EMAIL and CHECKOUT_URL runtime vars on Cloudflare Pages.
          VITE_SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
          VITE_CHECKOUT_URL: ${{ secrets.CHECKOUT_URL }}

      - name: Get commit SHA
        id: sha
        run: printf 'sha=%s\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}

      - name: Verify deploy (commit parity + asset MIME types)
        run: node scripts/verify-deploy.mjs https://qesto.cc
        env:
          GITHUB_SHA: ${{ github.sha }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
