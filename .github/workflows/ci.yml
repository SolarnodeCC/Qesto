name: CI

on:
  # Feature branches are validated once, on their PR — not also on every branch
  # push (that doubled every run). main still runs full CI + the deploy job.
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Docs-only changes don't need the test/build suite.
    paths-ignore:
      - '**/*.md'
      - 'knowledge-base/**'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: quality-gates · audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Pin to full commit SHA — tag refs can change without review
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      # Quality gates — runs local quality-gates.sh script
      - name: Run quality gates
        run: bash ops/ci/quality-gates.sh

      - name: Check migration numbers (no duplicates)
        run: bash ops/ci/check-migration-numbers.sh

      - name: Contracts drift check
        run: bash ops/ci/contracts.sh

      # Upload audit artifacts for agent repair routing
      - name: Upload audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: audit-results
          path: |
            agent/repo-score.json
            agent/repo-score.md
          retention-days: 30

      # Upload coverage artifacts
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build · deploy
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate the production deploy behind the `production` Environment. Configure it
    # in Settings → Environments with a required reviewer (or a wait-timer) and
    # move the Cloudflare secrets below to environment scope, so a push to main
    # pauses for approval before wrangler deploys + purges cache instead of
    # shipping straight to qesto.cc. See
    # knowledge-base/operations/security/GITHUB_INFRA_AUDIT_2026-07.md (finding C2).
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc
          # Keep in sync with SUPERUSER_EMAIL and CHECKOUT_URL runtime vars on Cloudflare Pages.
          VITE_SUPERUSER_EMAIL: ${{ secrets.SUPERUSER_EMAIL }}
          VITE_CHECKOUT_URL: ${{ secrets.CHECKOUT_URL }}

      - name: Get commit SHA
        id: sha
        run: printf 'sha=%s\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}

      - name: Purge Cloudflare cache
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Verify deploy (commit parity + asset MIME types)
        run: node scripts/verify-deploy.mjs https://qesto.cc
        env:
          GITHUB_SHA: ${{ github.sha }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Verify API health
        run: |
          echo "Checking API health endpoints..."
          health=$(curl -sf https://qesto.cc/api/admin/health)

          # Verify all systems are operational
          d1_ok=$(echo "$health" | jq -r '.d1')
          kv_ok=$(echo "$health" | jq -r '.kv')
          do_ok=$(echo "$health" | jq -r '.do')

          echo "D1: $d1_ok, KV: $kv_ok, DO: $do_ok"

          if [ "$d1_ok" != "ok" ] || [ "$kv_ok" != "ok" ] || [ "$do_ok" != "ok" ]; then
            echo "ERROR: API health check failed"
            exit 1
          fi

          echo "✓ All API systems healthy"

      - name: Platform v7 smoke (OPS-S99-CLOSEOUT-01)
        run: node scripts/smoke-platform-v7.mjs https://qesto.cc
