name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (SEC-03)
        run: npm audit --audit-level=moderate

      - name: Generate design tokens
        run: npm run tokens:build

      - name: Check for design token drift
        run: npm run check:tokens-drift

      - name: i18n validation (check-i18n)
        run: npm run check:i18n

      - name: TypeScript (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      - name: Stress tests
        run: npm run test:stress

      - name: Accessibility audit
        run: npm run test:a11y

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto-api.oostelaar.workers.dev

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
