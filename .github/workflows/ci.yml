name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: quality-gates · audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Pin to full commit SHA — tag refs can change without review
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31
        with:
          fetch-depth: 0

      - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      # Quality gates — runs local quality-gates.sh script
      - name: Run quality gates
        run: bash ops/ci/quality-gates.sh

      # Audit lane — jankurai scoring
      - name: Run jankurai audit
        run: |
          mkdir -p agent
          # Install jankurai globally if not present
          npm list -g jankurai || npm install -g jankurai
          jankurai . --json agent/repo-score.json --md agent/repo-score.md
        continue-on-error: true

      # Upload audit artifacts for agent repair routing
      - name: Upload audit artifacts
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: audit-results
          path: |
            agent/repo-score.json
            agent/repo-score.md
          retention-days: 30

      # Upload coverage artifacts
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build · deploy
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31

      - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}
