name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (SEC-03)
        run: npm audit --audit-level=moderate

      - name: Generate design tokens
        run: npm run tokens:build

      - name: Check for design token drift
        run: npm run check:tokens-drift

      - name: i18n validation (check-i18n)
        run: npm run check:i18n

      - name: Baseline metric assertions
        run: npm run check:baseline

      - name: Sprint 51-60 DoD file gate
        run: npm run check:sprint-51-60

      - name: "Security: Block raw error logging (PII gate)"
        run: |
          if grep -r "console\.error\(err\)" functions/api --include="*.ts" \
             | grep -v "lib/log.ts" \
             | grep -v ".test.ts"; then
            echo "ERROR: Raw console.error(err) detected outside safeLogContext()"
            echo "Use: safeLogContext(err, { traceId, route, errorClass, ... })"
            echo "See ADR-PII-SANITIZATION.md for details."
            exit 1
          fi

      - name: "Security: Block unchecked JSON.parse casts (HLT-031 gate)"
        run: |
          # Flag JSON.parse(...) followed by a concrete type assertion (not `as unknown`)
          # Safe patterns: validateData(...), Schema.parse(...), as unknown (intentionally wide)
          HITS=$(grep -rEn "JSON\.parse\([^)]*\)\s+as\s+[A-Z]" functions/api/lib functions/api/routes functions/api/middleware src \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "\.test\." \
            | grep -v "validateData\|validateKvJson\|validateJson\|schema\.parse\|Schema\.parse\|WebhookTeamIndexSchema\|\.safeParse" \
            | grep -v "^[^:]*:\s*//" || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: Unchecked JSON.parse() cast to concrete type detected (HLT-031)."
            echo "Wrap with validateData(parsed, MySchema) or Schema.safeParse(parsed)."
            echo "See docs/VALIDATION_PATTERNS.md for the pattern."
            echo ""
            echo "$HITS"
            exit 1
          fi

      - name: TypeScript (tsc --noEmit)
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      - name: Stress tests
        run: npm run test:stress

      - name: Accessibility audit
        run: npm run test:a11y

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7 # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Vite build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc

  deploy:
    name: deploy → Cloudflare Pages
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # v6

      - uses: actions/setup-node@v6 # v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://qesto.cc

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=qesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ steps.sha.outputs.sha }}

