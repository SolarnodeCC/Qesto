name: CI security · jankurai audit

on:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install jankurai
        run: |
          npm install "git+https://github.com/neverhuman/jankurai.git#v1.5.1"
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Prepare baseline
        run: |
          mkdir -p target/jankurai agent target/jankurai/proofbind target/jankurai/security
          cp -f agent/baselines/main.repo-score.json target/jankurai/accepted-baseline.json || echo '{}' > target/jankurai/accepted-baseline.json

      - name: audit-ci
        run: jankurai audit . --mode ratchet --baseline target/jankurai/accepted-baseline.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md

      - name: proof-routing
        run: jankurai audit . --mode ratchet --baseline target/jankurai/accepted-baseline.json --json agent/repo-score.json --md agent/repo-score.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl

      - name: proofbind
        run: jankurai proofbind verify . --changed-from origin/main

      - name: copy-code
        run: jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md

      - name: security
        run: jankurai security run . --strict --profile ci --out target/jankurai/security/evidence.json

      - name: db-migration-analyze
        run: jankurai migrate . --analyze --json target/jankurai/migration-report.json

      - name: ux-qa
        run: jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: jankurai-audit
          path: |
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/repair-queue.jsonl
            target/jankurai/copy-code.json
            target/jankurai/copy-code.md
            target/jankurai/security/evidence.json
            target/jankurai/migration-report.json
            target/jankurai/ux-qa.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofbind/obligations.json
          retention-days: 7

  security:
    name: supply-chain security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run supply chain security scan
        run: bash ops/ci/supply-chain.sh

      - name: Upload security scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: security-scan-results
          path: target/security/
          retention-days: 30
