name: Jankurai Audit

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: jeppsontaylor/Jankurai@v0.8.16
        with:
          mode: advisory

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jankurai-audit
          path: |
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/
          retention-days: 7
