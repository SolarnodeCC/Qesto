name: CI security · jankurai audit

on:
  push:
    branches: [main]
  # Run the audit BEFORE merge, not only after (issue #612). Without a
  # pull_request trigger the ratchet witness could only observe a regression on
  # the next push to main — by which point the bad commit was already merged.
  # Making the lane a required check in branch protection (so a ratchet failure
  # blocks the PR) is the complementary GitHub-settings step tracked in #612.
  pull_request:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # jankurai is a Rust CLI vendored via the `jankurai-workspace` dependency in
      # package.json (pinned in package-lock.json to the v1.6.10 tag). `npm ci`
      # above places the workspace under node_modules/; build the CLI from it with
      # cargo so the installed version is governed by the lockfile — a single
      # source of truth, no separate tag pin to drift. rustup/cargo are preinstalled
      # on ubuntu-latest runners.
      - name: Install jankurai (v1.6.10, from locked workspace)
        run: |
          cargo install --path node_modules/jankurai-workspace/crates/jankurai --locked --force
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/jankurai" version

      - name: Prepare output dirs
        run: mkdir -p target/jankurai agent target/jankurai/proofbind target/jankurai/security

      # Advisory (report-only) mode: the audit reports the score and repair queue
      # without failing CI. The repo's honest v1.6.10 score (~60) does not yet meet
      # the aspirational minimum_score=85 floor, and most hard findings are known
      # false positives / upstream-detector gaps (generated gh-aw lockfile, guard-hook
      # self-matches, ownerless paths) rather than real defects. Ratchet gating will
      # be re-enabled once remediation reaches the floor. The tracked baseline
      # (agent/baselines/main.repo-score.json) records the current honest score.
      - name: audit-ci
        run: jankurai audit . --mode advisory --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md

      - name: proof-routing
        run: jankurai audit . --mode advisory --json agent/repo-score.json --md agent/repo-score.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl

      # Remaining lanes run in advisory mode too (continue-on-error): they report
      # evidence and upload artifacts without gating the workflow while the repo is
      # below the aspirational floor. Re-tighten (drop continue-on-error) alongside
      # re-enabling ratchet once remediation lands.
      - name: proofbind
        continue-on-error: true
        run: jankurai proofbind verify . --changed-from origin/main

      - name: copy-code
        continue-on-error: true
        run: jankurai copy-code . --json target/jankurai/copy-code.json --md target/jankurai/copy-code.md

      - name: security
        continue-on-error: true
        run: jankurai security run . --strict --profile ci --out target/jankurai/security/evidence.json

      - name: db-migration-analyze
        continue-on-error: true
        run: jankurai migrate . --analyze --json target/jankurai/migration-report.json

      - name: ux-qa
        continue-on-error: true
        run: jankurai ux audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: jankurai-audit
          path: |
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/repair-queue.jsonl
            target/jankurai/copy-code.json
            target/jankurai/copy-code.md
            target/jankurai/security/evidence.json
            target/jankurai/migration-report.json
            target/jankurai/ux-qa.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofbind/obligations.json
          retention-days: 7

  security:
    name: supply-chain security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run supply chain security scan
        run: bash ops/ci/supply-chain.sh

      - name: Upload security scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: security-scan-results
          path: target/security/
          retention-days: 30
