name: Jankurai Audit

on:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31

      - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Jankurai Audit
        run: bash ops/ci/jankurai.sh

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: jankurai-audit
          path: target/jankurai/
          retention-days: 7

  security:
    name: supply-chain security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31

      - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Supply Chain Security Scan
        run: bash ops/ci/supply-chain.sh

      - name: Upload security scan results
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: security-scan-results
          path: target/security/
          retention-days: 30
