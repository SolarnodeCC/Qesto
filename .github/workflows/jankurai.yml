name: Jankurai Audit

on:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6 # v6

      - uses: neverhuman/jankurai@v1.5.1 # v1.5.1
        with:
          mode: advisory

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@v7 # v7
        if: always()
        with:
          name: jankurai-audit
          path: target/jankurai/
          retention-days: 7
