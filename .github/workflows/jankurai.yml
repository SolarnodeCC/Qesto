name: Jankurai Audit

on:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Jankurai Audit
        run: bash ops/ci/jankurai.sh

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: jankurai-audit
          path: |
            agent/repo-score.json
            agent/repo-score.md
            target/jankurai/
          retention-days: 7

  security:
    name: supply-chain security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Supply Chain Security Scan
        run: bash ops/ci/supply-chain.sh

      - name: Upload security scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: security-scan-results
          path: target/security/
          retention-days: 30
