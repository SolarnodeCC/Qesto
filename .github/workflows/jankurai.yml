name: Jankurai Audit

on:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # For SARIF upload

jobs:
  audit:
    name: jankurai audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31

      - uses: neverhuman/jankurai@3a8b8e7e1f5a8b8e7e1f5a8b8e7e1f5a8b8e7e1f
        with:
          mode: advisory

      - name: Upload Jankurai audit report
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: jankurai-audit
          path: target/jankurai/
          retention-days: 7

  security:
    name: supply-chain security scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@e0f025ddd1d4a93d97883a6e90b90c6f02a12d31

      - uses: actions/setup-node@60edb5dd545a775178f3159f25d48a7b09cbd043
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (dependency security)
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: npm audit (JSON output for parsing)
        run: |
          mkdir -p target/security
          npm audit --json > target/security/npm-audit.json || true

      - name: Secret scanning (gitleaks)
        run: |
          mkdir -p target/security
          # gitleaks scan for repository secrets
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source /repo \
            --verbose \
            --exit-code 0 \
            --report-path /repo/target/security/gitleaks.json || true
        continue-on-error: true

      - name: Upload security artifacts
        uses: actions/upload-artifact@6bc7d64a6f01890e8e7f6e1fa2080c6cc5192b55
        if: always()
        with:
          name: security-scan-results
          path: target/security/
          retention-days: 30

      - name: Dependency provenance check
        run: |
          # Verify package-lock.json integrity
          npm ci --dry-run --silent 2>&1 | grep -q "added 0 packages" && \
          echo "✓ Package provenance verified" || \
          echo "⚠ Package changes detected, review needed"
        continue-on-error: true
