<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-body)}
  .card{width:660px;padding:24px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .swatch{border-radius:var(--radius-md);height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-weight:500;font-family:var(--font-mono);box-shadow:inset 0 0 0 1px rgba(10,15,30,0.05)}
  .swatch.lt{color:var(--pulse-900)}
  .swatch .hex{opacity:.85}
  .grid5{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .label{font-size:11px;color:var(--pulse-500);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
</style></head>
<body><div class="card">
<div class="label">Teal · Primary brand</div>
<div class="grid5">
  <div class="swatch lt" style="background:#F0FDFA"><span>50</span><span class="hex">F0FDFA</span></div>
  <div class="swatch lt" style="background:#CCFBF1"><span>100</span><span class="hex">CCFBF1</span></div>
  <div class="swatch lt" style="background:#99F6E4"><span>200</span><span class="hex">99F6E4</span></div>
  <div class="swatch lt" style="background:#5EEAD4"><span>300</span><span class="hex">5EEAD4</span></div>
  <div class="swatch" style="background:#2DD4BF"><span>400</span><span class="hex">2DD4BF</span></div>
  <div class="swatch" style="background:#14B8A6"><span>500</span><span class="hex">14B8A6</span></div>
  <div class="swatch" style="background:#0D9488"><span>600</span><span class="hex">0D9488</span></div>
  <div class="swatch" style="background:#0F766E"><span>700</span><span class="hex">0F766E</span></div>
  <div class="swatch" style="background:#115E59"><span>800</span><span class="hex">115E59</span></div>
  <div class="swatch" style="background:#134E4A"><span>900</span><span class="hex">134E4A</span></div>
</div>
</div></body></html>
