<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row4 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 9999px; display: inline-flex; gap: 4px; align-items: center; }
  .b-live { background: #22C55E; color: #FFF; }
  .b-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #FFF; box-shadow: 0 0 0 0 rgba(255,255,255,0.7); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); } 50% { box-shadow: 0 0 0 4px rgba(255,255,255,0); } }
  .b-draft { background: #F5F5F5; color: #525252; }
  .b-scheduled { background: #E0F2FE; color: #0369A1; }
  .b-ended { background: #FEF3C7; color: #92400E; }
  .b-ai { background: linear-gradient(135deg, #EDE9FE, #CCFBF1); color: #6D28D9; box-shadow: inset 0 0 0 1px #DDD6FE; }
  .chip { font-size: 13px; padding: 6px 12px; border-radius: 6px; background: #F5F5F5; color: #262626; display: inline-flex; align-items: center; gap: 6px; }
  .chip.sel { background: #CCFBF1; color: #0F766E; box-shadow: inset 0 0 0 1.5px #14B8A6; }
  .chip .x { opacity: .5; cursor: pointer; }
</style>
<div class="kicker">Session status badges</div>
<div class="row4">
  <span class="badge b-live">Live · 34 connected</span>
  <span class="badge b-scheduled">Scheduled · Tue 10:00</span>
  <span class="badge b-draft">Draft</span>
  <span class="badge b-ended">Ended · 2h ago</span>
  <span class="badge b-ai">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="#7C3AED"><path d="M12 2l2 6h6l-5 4 2 7-5-4-5 4 2-7-5-4h6z"/></svg>
    AI recap ready
  </span>
</div>
<div class="kicker" style="margin-top:20px">Filter chips</div>
<div class="row4">
  <span class="chip sel">All sessions</span>
  <span class="chip">Hosted by me</span>
  <span class="chip">This month</span>
  <span class="chip">HR · 4<span class="x">×</span></span>
  <span class="chip">Anonymity: full</span>
</div>
