<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Qesto — Host dashboard</title>
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../qr.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface-bg-subtle); font-family: var(--font-body); color: var(--text-primary); }
  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Card, Badge, AIBadge, MetricCard, TallyBar, Eyebrow } = window.QestoDesignSystem_10c0a6
const { useState, useEffect } = React

function Icon({ name, size = 18, color, style }) {
  return <i data-lucide={name} width={size} height={size} style={{ display:'inline-flex', color: color||'currentColor', ...style }} />
}

function QR({ text, size = 120, style }) {
  const ref = React.useRef(null)
  React.useEffect(() => { window.QestoQR && window.QestoQR.render(ref.current, text, size) }, [text, size])
  return <div ref={ref} style={{ width:size, height:size, display:'flex', alignItems:'center', justifyContent:'center', ...style }} />
}

function Sidebar({ view, setView }) {
  const items = [
    ['Launchpad','rocket','launchpad'],
    ['Sessions','layout-list','sessions'],
    ['Templates','layout-template','templates'],
    ['Insights','sparkles','insights'],
    ['Team','users','team'],
    ['Settings','settings','settings'],
  ]
  return (
    <aside style={{ width:240, flexShrink:0, background:'var(--surface-card)', borderRight:'1px solid var(--surface-border)', height:'100%', display:'flex', flexDirection:'column', padding:'20px 16px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'4px 8px 24px' }}>
        <img src="../../assets/qesto-mark.svg" width="28" height="28" alt="" />
        <span style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:20, letterSpacing:'-0.02em' }}>Qesto</span>
      </div>
      <nav style={{ display:'flex', flexDirection:'column', gap:2 }}>
        {items.map(([label,ic,key]) => {
          const active = view===key
          return (
            <button key={key} onClick={()=>setView(key)} style={{
              display:'flex', alignItems:'center', gap:11, padding:'9px 12px', borderRadius:10, border:'none', cursor:'pointer', textAlign:'left',
              fontSize:14, fontWeight: active?600:500, fontFamily:'var(--font-body)',
              background: active?'var(--teal-50)':'transparent', color: active?'var(--teal-700)':'var(--text-secondary)',
            }}>
              <Icon name={ic} size={17} />{label}
            </button>
          )
        })}
      </nav>
      <div style={{ marginTop:'auto', display:'flex', alignItems:'center', gap:10, padding:'10px 8px' }}>
        <div style={{ width:32, height:32, borderRadius:'50%', background:'var(--gradient-brand)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:600, fontSize:13 }}>AR</div>
        <div style={{ lineHeight:1.3 }}>
          <div style={{ fontSize:13, fontWeight:600 }}>Ana Ruiz</div>
          <div style={{ fontSize:12, color:'var(--text-muted)' }}>Pro workspace</div>
        </div>
      </div>
    </aside>
  )
}

const SESSIONS = [
  ['Q3 strategy offsite','live',48,'2 min ago'],
  ['Sprint 24 retro','draft',0,'1 hr ago'],
  ['All-hands pulse — June','closed',212,'Yesterday'],
  ['Board motion: budget','closed',9,'3 days ago'],
  ['Onboarding feedback','closed',64,'Last week'],
]
const STATUS = { live:['Live','primary'], draft:['Draft','neutral'], closed:['Closed','success'] }

function Dashboard() {
  return (
    <div style={{ padding:'32px 40px', display:'flex', flexDirection:'column', gap:28, maxWidth:1000 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div>
          <Eyebrow>Workspace</Eyebrow>
          <h1 style={{ fontSize:32, fontWeight:600, letterSpacing:'-0.01em', margin:'8px 0 0' }}>Good morning, Ana</h1>
        </div>
        <Button size="md" iconLeft={<Icon name="plus" size={16} />}>New session</Button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16 }}>
        <MetricCard label="Active sessions" value={1} />
        <MetricCard label="Response rate" value="87%" trend={{ value:4.2, direction:'up' }} />
        <MetricCard label="Avg latency" value="183ms" trend={{ value:12, direction:'up', inverted:true }} />
        <MetricCard label="Consent opt-in" value="94%" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr', gap:24, alignItems:'start' }}>
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h2 style={{ fontSize:18, fontWeight:600, margin:0 }}>Recent sessions</h2>
            <a href="#" style={{ fontSize:13, color:'var(--teal-700)', fontWeight:500 }}>View all</a>
          </div>
          <Card style={{ padding:0, overflow:'hidden' }}>
            {SESSIONS.map(([title,status,part,when],i) => {
              const [lbl,variant] = STATUS[status]
              return (
                <div key={title} style={{ display:'flex', alignItems:'center', gap:16, padding:'14px 18px', borderTop: i?'1px solid var(--surface-border)':'none' }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:15, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{title}</div>
                    <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2, display:'flex', gap:12 }}>
                      <span style={{ display:'flex', alignItems:'center', gap:4 }}><Icon name="users" size={12} />{part}</span>
                      <span>{when}</span>
                    </div>
                  </div>
                  <Badge variant={variant}>{status==='live' && <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--teal-600)' }} />}{lbl}</Badge>
                  <button style={{ display:'flex', alignItems:'center', gap:5, fontSize:13, fontWeight:500, color:'var(--violet-700)', background:'none', border:'none', cursor:'pointer', fontFamily:'var(--font-body)' }}>
                    <Icon name="sparkles" size={14} />Recap
                  </button>
                </div>
              )
            })}
          </Card>
        </div>

        <div>
          <h2 style={{ fontSize:18, fontWeight:600, margin:'0 0 14px' }}>Latest AI recap</h2>
          <div style={{ borderLeft:'3px solid var(--violet-500)', background:'var(--violet-50)', borderRadius:'0 16px 16px 0', padding:'18px 20px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
              <AIBadge variant="analyzed" />
              <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-muted)' }}>1.4s · 212 responses</span>
            </div>
            <div style={{ fontSize:15, fontWeight:600, marginBottom:4 }}>Onboarding friction is the top theme</div>
            <p style={{ fontSize:13, lineHeight:1.5, color:'var(--text-secondary)', margin:'0 0 14px' }}>
              42 responses cluster on slow first-week setup. Exemplar: <em>"I waited three days for access."</em>
            </p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <TallyBar label="Onboarding & access" count={42} total={86} leading />
              <TallyBar label="Tooling gaps" count={27} total={86} />
              <TallyBar label="Comms cadence" count={17} total={86} />
            </div>
            <div style={{ display:'flex', gap:8, marginTop:16 }}>
              <Button size="sm" variant="secondary">Edit recap</Button>
              <Button size="sm" variant="ghost">Export</Button>
            </div>
          </div>
        </div>
      </div>
    </div>
  )
}

function Launchpad() {
  const CODE = 'QSTO-7K2'
  const [questions, setQuestions] = useState([
    ['Poll','Which sprint goal should we commit to first?'],
    ['Ranking','Rank these initiatives by impact'],
    ['Open','What is the single biggest blocker right now?'],
    ['Consent','Share an AI recap of this session with the team?'],
  ])
  const [copied, setCopied] = useState(false)
  const [dragIdx, setDragIdx] = useState(null)
  const [overIdx, setOverIdx] = useState(null)
  const checks = [
    ['Session title', true, 'Looks good'],
    ['At least one question', true, `${questions.length} added`],
    ['Questions are launch-ready', true, 'All valid'],
    ['AI consent acknowledged', true, 'Recap enabled'],
  ]
  const allValid = checks.every(c => c[1])

  function copy() { setCopied(true); setTimeout(()=>setCopied(false), 1600) }
  function onDrop(to) {
    if (dragIdx === null || dragIdx === to) { setDragIdx(null); setOverIdx(null); return }
    const next = [...questions]; const [m] = next.splice(dragIdx,1); next.splice(to,0,m)
    setQuestions(next); setDragIdx(null); setOverIdx(null)
  }

  return (
    <div style={{ padding:'32px 40px', maxWidth:1000 }}>
      <a href="#" style={{ fontSize:13, color:'var(--teal-700)', display:'inline-flex', alignItems:'center', gap:5, marginBottom:18, textDecoration:'none' }}><Icon name="arrow-left" size={14} />Dashboard</a>

      {/* Editable title field */}
      <div style={{ marginBottom:8 }}>
        <label style={{ display:'block', fontSize:12, fontWeight:600, letterSpacing:'0.04em', textTransform:'uppercase', color:'var(--text-muted)', marginBottom:6 }}>Session title</label>
        <div style={{ display:'inline-flex', alignItems:'center', gap:10, maxWidth:'100%' }}>
          <h1 style={{ fontSize:30, fontWeight:600, letterSpacing:'-0.01em', margin:0 }}>Q3 strategy offsite</h1>
          <span style={{ display:'inline-flex', width:30, height:30, alignItems:'center', justifyContent:'center', borderRadius:8, color:'var(--text-muted)', cursor:'pointer' }}><Icon name="pencil" size={15} /></span>
        </div>
      </div>
      <div style={{ display:'inline-flex', alignItems:'center', gap:7, padding:'4px 11px', borderRadius:999, background:'var(--pulse-100)', fontSize:12.5, fontWeight:600, color:'var(--text-secondary)', marginBottom:26 }}>
        <span style={{ width:7, height:7, borderRadius:'50%', background:'var(--text-muted)' }} />Draft · launch-ready
      </div>

      <div style={{ display:'flex', gap:24, alignItems:'flex-start' }}>
        {/* Join code panel */}
        <Card style={{ width:330, flexShrink:0, textAlign:'center', padding:'26px 24px', background:'var(--gradient-brand-subtle)' }}>
          <div style={{ fontSize:12, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--teal-700)', marginBottom:14 }}>Join code</div>
          <button onClick={copy} title="Copy join code to clipboard" style={{ display:'inline-flex', alignItems:'center', gap:10, border:'none', background:'transparent', cursor:'pointer', marginBottom:6 }}>
            <span className="text-gradient-brand" style={{ fontFamily:'var(--font-mono)', fontWeight:600, fontSize:42, letterSpacing:'0.08em', lineHeight:1 }}>{CODE}</span>
            <span style={{ display:'inline-flex', color: copied?'var(--signal-success)':'var(--text-muted)' }}><Icon name={copied?'check':'copy'} size={18} /></span>
          </button>
          <div style={{ height:18, fontSize:12.5, fontWeight:600, color:'var(--signal-success)', marginBottom:6 }}>{copied ? 'Code copied to clipboard!' : ''}</div>
          <div style={{ width:128, height:128, margin:'0 auto 14px', borderRadius:14, background:'#fff', border:'1px solid var(--surface-border)', display:'flex', alignItems:'center', justifyContent:'center', padding:10 }}>
            <QR text={`https://qesto.cc/join/${CODE}`} size={104} />
          </div>
          <p style={{ fontSize:12.5, color:'var(--text-muted)', lineHeight:1.45, margin:'0 0 18px' }}>Participants go to <span style={{ fontFamily:'var(--font-mono)', color:'var(--text-secondary)' }}>qesto.cc/join</span> and enter this code.</p>
          <Button size="lg" disabled={!allValid} style={{ width:'100%' }} iconLeft={<Icon name="rocket" size={16} />}>Go Live</Button>
          <button style={{ width:'100%', marginTop:10, padding:'9px', borderRadius:'var(--radius-md)', border:'1px solid var(--surface-border-strong)', background:'transparent', color:'var(--text-secondary)', fontFamily:'var(--font-body)', fontSize:13.5, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:7 }}><Icon name="share-2" size={14} />Share with participants</button>
        </Card>

        <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:16 }}>
          {/* Pre-flight checklist */}
          <Card>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14 }}>
              <span style={{ display:'inline-flex', color:'var(--signal-success)' }}><Icon name="circle-check-big" size={17} /></span>
              <span style={{ fontSize:14, fontWeight:600 }}>Pre-flight checklist</span>
              <span style={{ marginLeft:'auto', fontSize:12, fontWeight:600, color:'var(--signal-success)' }}>Ready to launch</span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {checks.map(([l,ok,msg])=>(
                <div key={l} style={{ display:'flex', alignItems:'center', gap:10, fontSize:14 }}>
                  <span style={{ width:18, height:18, flexShrink:0, borderRadius:'50%', background:'var(--signal-success)', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="check" size={12} color="#fff" /></span>
                  <span style={{ color:'var(--text-primary)' }}>{l}</span>
                  <span style={{ marginLeft:'auto', fontSize:12.5, color:'var(--text-muted)' }}>{msg}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* Energizer panel */}
          <Card style={{ display:'flex', alignItems:'center', gap:14 }}>
            <span style={{ width:42, height:42, flexShrink:0, borderRadius:12, display:'flex', alignItems:'center', justifyContent:'center', background:'var(--violet-50)', color:'var(--violet-700)' }}><Icon name="zap" size={20} /></span>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, fontWeight:600 }}>Energizer · Emoji Poll</div>
              <div style={{ fontSize:12.5, color:'var(--text-muted)', marginTop:2 }}>Warms up the room before questions start</div>
            </div>
            <Button size="sm" variant="ghost">Change</Button>
          </Card>

          {/* Question list */}
          <Card style={{ padding:0, overflow:'hidden' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:10, padding:'14px 18px', borderBottom:'1px solid var(--surface-border)' }}>
              <span style={{ fontSize:14, fontWeight:600 }}>Questions ({questions.length})</span>
              <div style={{ display:'flex', gap:8 }}>
                <Button size="sm" variant="ghost" iconLeft={<Icon name="sparkles" size={14} />}>Generate</Button>
                <Button size="sm" variant="secondary" iconLeft={<Icon name="plus" size={14} />}>Add question</Button>
              </div>
            </div>
            {questions.map(([kind,prompt],i)=>(
              <div key={prompt}
                draggable
                onDragStart={()=>setDragIdx(i)}
                onDragOver={(e)=>{ e.preventDefault(); setOverIdx(i) }}
                onDrop={()=>onDrop(i)}
                onDragEnd={()=>{ setDragIdx(null); setOverIdx(null) }}
                style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 18px', borderTop: i?'1px solid var(--surface-border)':'none', background: overIdx===i&&dragIdx!==null?'var(--teal-50)':(dragIdx===i?'var(--pulse-50)':'transparent'), opacity: dragIdx===i?0.5:1, cursor:'grab' }}>
                <span title="Drag to reorder" style={{ display:'inline-flex', color:'var(--pulse-300)' }}><Icon name="grip-vertical" size={16} /></span>
                <span style={{ fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-muted)', width:16 }}>{i+1}</span>
                <Badge variant="neutral">{kind}</Badge>
                <span style={{ flex:1, fontSize:14, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{prompt}</span>
                <span style={{ display:'inline-flex', color:'var(--pulse-400)', cursor:'pointer' }}><Icon name="pencil" size={15} /></span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  )
}

function Topbar() {
  return (
    <div style={{ height:56, flexShrink:0, borderBottom:'1px solid var(--surface-border)', background:'var(--surface-card)', display:'flex', alignItems:'center', gap:16, padding:'0 24px' }}>
      <div style={{ flex:1, maxWidth:360, position:'relative', display:'flex', alignItems:'center' }}>
        <span style={{ position:'absolute', left:12, display:'flex', color:'var(--text-muted)' }}><Icon name="search" size={16} /></span>
        <input placeholder="Search sessions, templates…" style={{ width:'100%', padding:'8px 12px 8px 34px', fontSize:14, fontFamily:'var(--font-body)', borderRadius:10, border:'1px solid var(--surface-border)', background:'var(--surface-bg-subtle)', outline:'none' }} />
      </div>
      <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:14, color:'var(--text-muted)' }}>
        <Icon name="bell" size={18} />
        <Icon name="circle-help" size={18} />
      </div>
    </div>
  )
}

function App() {
  const [view, setView] = useState('launchpad')
  useEffect(() => { const t=setTimeout(()=>window.lucide&&window.lucide.createIcons(),0); return ()=>clearTimeout(t) })
  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar view={view} setView={setView} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Topbar />
        <div style={{ flex:1, overflowY:'auto' }}>
          {view==='launchpad' ? <Launchpad /> : <Dashboard />}
        </div>
      </div>
    </div>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
