[triggers]
# Daily KB vector retrieval health watchdog at 02:00 UTC (worker/index.ts -> handleScheduled).
# This does NOT embed/sync — the embed+sync runs in CI on knowledge-base/ changes
# (.github/workflows/kb-sync-on-merge.yml -> npm run kb:sync). The cron verifies retrieval is
# healthy: D1 has chunks, query model/dim matches the index, and the index returns matches.
#
# Marketing automation (worker/index.ts -> handleScheduled):
#   "0 6 * * 3,5,7" — Content Engine (Tue/Thu/Sat 06:00 UTC; single expression — the
#                     handler and ops-cron.ts registry match on this exact string)
#   "0 */3 * * *"   — Mention Monitor (every 3h)
#   "0 4 * * *"     — OAuth token proactive refresh (daily 04:00 UTC)
#
# ⚠️ Cloudflare day-of-week is 1=Sunday … 7=Saturday (NOT the standard 0=Sunday..6=Sat).
# `0` is INVALID and makes the whole /schedules deploy fail with 400. So:
#   Sunday=1, Mon=2, Tue=3, Wed=4, Thu=5, Fri=6, Sat=7.
#   "0 3 * * 1"     — weekly KV backup, Sunday 03:00 UTC
#   "0 6 * * 3,5,7" — Content Engine, Tue/Thu/Sat 06:00 UTC
# See https://developers.cloudflare.com/workers/configuration/cron-triggers/
#
# ⚠️ Cloudflare allows at most 5 cron triggers per Worker — we are at the limit.
# To add a schedule, combine it into an existing expression (day-of-week lists etc.)
# or dispatch off an existing firing; a 6th entry makes the schedules deploy fail.
crons = ["0 2 * * *", "0 3 * * 1", "0 6 * * 3,5,7", "0 */3 * * *", "0 4 * * *"]

