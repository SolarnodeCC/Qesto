name = "qesto"
compatibility_date = "2026-04-19"

# Sprint 1+ will add: main = "worker/index.ts" for the API Worker
# Pages Functions (functions/api/) are deployed via `wrangler pages deploy ./dist`

[assets]
directory = "./public"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
