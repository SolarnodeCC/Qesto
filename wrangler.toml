name = "qesto-api"
account_id = "5546763229b35df670e33d9316d7f2e0"
main = "worker/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Worker — API only. Static frontend is deployed separately to Cloudflare Pages.
# Secrets: `wrangler secret put <NAME>` — never inline here (CLAUDE.md hard rule 2).
#
# AI Gateway (ADR-042 Phase 1.1 — semantic caching + per-account rate limits).
# Create the gateway in the CF dashboard (AI → AI Gateway), then activate with:
#   wrangler secret put CLOUDFLARE_AI_GATEWAY_ID      # gateway id/slug
#   wrangler secret put CLOUDFLARE_AI_GATEWAY_TOKEN   # API token with AI Gateway Run permission
# When either secret is absent every AI call bypasses the gateway (direct env.AI.run).
#
# Marketing automation (Content Engine / Mention Monitor / Publisher, this Worker's
# cron). Set on THIS Worker (qesto-api) — the OAuth *connect pages* themselves
# (functions/{linkedin,reddit,youtube}-auth.ts) are Pages Functions and need the
# same client id/secret + INTEGRATIONS_KV bound separately on the "qesto" Pages
# project (dashboard → Settings → Functions), per workers/linkedin-scheduler/README.md:
#   wrangler secret put REDDIT_CLIENT_ID
#   wrangler secret put REDDIT_CLIENT_SECRET
#   wrangler secret put YOUTUBE_CLIENT_ID
#   wrangler secret put YOUTUBE_CLIENT_SECRET
#   wrangler secret put VIDEO_PREVIEW_SIGNING_KEY   # HMAC key signing short-TTL video preview URLs
#
# ──────────────────────────────────────────────────────────────────────────────
# BOOTSTRAP: D1 + KV bindings are commented out because their IDs are per-account.
# Follow docs/DEPLOY_BOOTSTRAP.md once to provision the resources, paste the IDs
# back in below, and uncomment the blocks. Until then, only [observability], [ai],
# and the SessionRoom DO deploy — /api/admin/health works but /api/auth/* (which
# needs `DB`) will 500 until D1 is wired.
# ──────────────────────────────────────────────────────────────────────────────

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# ─────────────────────────────────────────────────────────────────────────────
# Production (default)
# ─────────────────────────────────────────────────────────────────────────────

[vars]
ENV = "production"
# PAGES_URL: Cloudflare Pages origin — used for CORS allowed-origin and CSRF check.
PAGES_URL = "https://qesto.cc"
# API_URL: this Worker's own URL — used for OAuth redirect_uri and email magic-link base.
API_URL = "https://qesto.cc"
# Cloudflare Access (optional admin surface). Public user auth = magic link (Phase 1).
CF_ACCESS_AUDIENCE = "0b2fa5d8bb22ac84a34705e0a077ea486cbad83611ca748a630aafdbbf34b9de"
CF_ACCESS_CERTS_URL = "https://ssolarnode.cloudflareaccess.com/cdn-cgi/access/certs"
# CI overrides COMMIT_SHA at deploy time with the actual git SHA.
COMMIT_SHA = "dev"
# SAML Service Provider configuration (non-secret; the IdP's certificate is
# per-team and stored in TEAMS_KV, not here). See functions/api/lib/saml.ts.
SAML_SP_ENTITY_ID = "https://qesto.cc"
SAML_ACS_URL = "https://qesto.cc/api/auth/saml/callback"
# Superuser email — bypasses plan quotas and gets team-tier access.
# SUPERUSER_EMAIL: set via `wrangler secret put SUPERUSER_EMAIL` — never commit to source control.
# Checkout URL for paid plan upgrades.
CHECKOUT_URL = "https://checkout.qesto.cc"
# Resend sender identity; must be a verified sender/domain in your Resend account.
# Use a branded sender on qesto.cc for production auth emails.
RESEND_FROM = "Qesto <login@qesto.cc>"

# Feature flags (production)
REALTIME_TOWNHALL_ENABLED = "true"
# GROWTH-ENGINE: IndexNow API key for SEO indexing (optional; template pages auto-index if set).
# Get from https://www.bing.com/indexnow (register domain, get key, paste here).
# INDEXNOW_KEY = ""
# Integrations: Slack/Teams notifications (gates integration checks in routes).
INTEGRATION_ENABLED = "1"
# Circuit breaker: fail-closed pattern for safeguarding against traffic spikes or abuse.
CIRCUIT_BREAKER_ENABLED = "true"
# Energizers: warm-up activities before live questions (DRAFT→ENERGIZING state machine).
LIVE_ENERGIZERS_ENABLED = "true"
# Sentiment analysis: AI-powered response sentiment scoring (Workers AI per response).
SENTIMENT_ENABLED = "true"
# XR spatial/immersive session beta (ADR-0066). OFF by default — beta kill-switch.
# Additive on protocol v3 (no version bump). When off, the DO ignores inbound
# xr_avatar_sync and omits the 'xr' init feature capability. Excluded from
# zero_knowledge sessions regardless of this flag.
BETA_XR_ENABLED = "false"
# SAML SSO master switch (SEC-SAML-01, #529). MUST stay "false" in production:
# the SP does not yet verify the XML-DSig signature on assertions. Both this flag
# AND SAML_SIGNATURE_VERIFY_ENABLED must be "true" before routes serve traffic.
# Flip only after assertion signature verification ships.
SAML_SSO_ENABLED = "false"
# SEC-SAML-01 (#529): second gate — MUST stay false until XML-DSig ships in saml.ts.
SAML_SIGNATURE_VERIFY_ENABLED = "false"

# ⚠️ PRODUCTION DATABASE — DO NOT APPLY MIGRATIONS MANUALLY
# v2.2 migrations (0016_recaps_table.sql, 0020_v2_2_schema.sql) are staged.
