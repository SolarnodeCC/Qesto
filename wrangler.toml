name = "qesto-api"
account_id = "5546763229b35df670e33d9316d7f2e0"
main = "worker/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Worker — API only. Static frontend is deployed separately to Cloudflare Pages.
# Secrets: `wrangler secret put <NAME>` — never inline here (CLAUDE.md hard rule 2).
#
# ──────────────────────────────────────────────────────────────────────────────
# BOOTSTRAP: D1 + KV bindings are commented out because their IDs are per-account.
# Follow docs/DEPLOY_BOOTSTRAP.md once to provision the resources, paste the IDs
# back in below, and uncomment the blocks. Until then, only [observability], [ai],
# and the SessionRoom DO deploy — /api/admin/health works but /api/auth/* (which
# needs `DB`) will 500 until D1 is wired.
# ──────────────────────────────────────────────────────────────────────────────

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

# ─────────────────────────────────────────────────────────────────────────────
# Production (default)
# ─────────────────────────────────────────────────────────────────────────────

[vars]
ENV = "production"
# PAGES_URL: Cloudflare Pages origin — used for CORS allowed-origin and CSRF check.
PAGES_URL = "https://qesto.cc"
# API_URL: this Worker's own URL — used for OAuth redirect_uri and email magic-link base.
API_URL = "https://qesto.cc"
# Cloudflare Access (optional admin surface). Public user auth = magic link (Phase 1).
CF_ACCESS_AUDIENCE = "0b2fa5d8bb22ac84a34705e0a077ea486cbad83611ca748a630aafdbbf34b9de"
CF_ACCESS_CERTS_URL = "https://ssolarnode.cloudflareaccess.com/cdn-cgi/access/certs"
# CI overrides COMMIT_SHA at deploy time with the actual git SHA.
COMMIT_SHA = "dev"
# SAML Service Provider configuration (non-secret; the IdP's certificate is
# per-team and stored in TEAMS_KV, not here). See functions/api/lib/saml.ts.
SAML_SP_ENTITY_ID = "https://qesto.cc"
SAML_ACS_URL = "https://qesto.cc/api/auth/saml/callback"
# Superuser email — bypasses plan quotas and gets team-tier access.
SUPERUSER_EMAIL = "oostelaar@hotmail.com"
# Seed admin email — grants owner/admin roles in dev/test (remove in production).
SEED_ADMIN_EMAIL = "qesto@example.com"
# Checkout URL for paid plan upgrades.
CHECKOUT_URL = "https://checkout.qesto.cc"
# Resend sender identity; must be a verified sender/domain in your Resend account.
# Use a branded sender on qesto.cc for production auth emails.
RESEND_FROM = "Qesto <login@qesto.cc>"
# GROWTH-ENGINE: IndexNow API key for SEO indexing (optional; template pages auto-index if set).
# Get from https://www.bing.com/indexnow (register domain, get key, paste here).
# INDEXNOW_KEY = ""
# Integrations: Slack/Teams notifications (gates integration checks in routes).
INTEGRATION_ENABLED = "1"

# ⚠️ PRODUCTION DATABASE — DO NOT APPLY MIGRATIONS MANUALLY
# v2.2 migrations (0016_recaps_table.sql, 0020_v2_2_schema.sql) are staged.
# Only apply during Sprint 26 release with feature flag approval.
# See docs/PRODUCTION-DB-MIGRATION-FIX.md for details.

[[d1_databases]]
binding = "DB"
database_name = "qesto_3_db"
database_id = "d391bdd5-a03d-41bc-bc45-6b5f3bac1b1b"
migrations_dir = "migrations"

# KV — uncomment after `wrangler kv namespace create <BINDING>` for each and paste each id.
[[kv_namespaces]]
binding = "USERS_KV"
id = "59ace5d056a340098f1ceaf8990eca4b"
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "88275458e15e4ce6ae097535ead3bcb4"
[[kv_namespaces]]
binding = "TEAMS_KV"
id = "987c025856de4b21a5e606af16c73d94"
[[kv_namespaces]]
binding = "TEMPLATES_KV"
id = "5406a5484688421f9a60f3ab683827e2"
[[kv_namespaces]]
binding = "DECISIONS_KV"
id = "50b43d826334455980bb84b2e0f442b7"
[[kv_namespaces]]
binding = "AUDIT_KV"
id = "8a418acd50924c89a6fb8d19a7777d31"
[[kv_namespaces]]
binding = "ACTIONS_KV"
id = "59680ad5a348400f89f36c148dbc72ef"
[[kv_namespaces]]
binding = "METRICS_KV"
id = "afe3946dc37d4b2ea506ef41a246396b"
[[kv_namespaces]]
binding = "HELP_CONVERSATIONS_KV"
id = "8d08b7883b6c451b88a653ce8ba55c13"
[[kv_namespaces]]
binding = "MARKETING_KV"
id = "4ce59ef235b04802a7e9e218928bb022"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom"]

[ai]
binding = "AI"

[[workflows]]
binding = "WORKFLOWS"
name = "WORKFLOWS"
class_name = "TemplateGenerationWorkflow"

# HELP_CONVERSATIONS_KV will be provisioned in Week 2 when endpoints are implemented
# [[kv_namespaces]]
# binding = "HELP_CONVERSATIONS_KV"
# id = "<to-be-created>"

[[vectorize]]
binding = "DECISIONS_VECTORIZE"
index_name = "qesto-decisions"

[[vectorize]]
binding = "HELP_VECTORIZE"
index_name = "qesto-help"

[[vectorize]]
binding = "KB_VECTORIZE"
index_name = "qesto-kb-production"

[[analytics_engine_datasets]]
binding = "METRICS_AE"
dataset = "qesto_metrics"

[triggers]
# Phase 5: Scheduled KB sync via Cloudflare Workers Cron
# Triggers daily at 02:00 UTC to check for KB changes and auto-sync to Vectorize
crons = ["0 2 * * *"]

# ─────────────────────────────────────────────────────────────────────────────
# Staging (v2.2 pre-work)
# ─────────────────────────────────────────────────────────────────────────────
# Sprint 20 pre-work: Provision staging D1 + KV via docs/INFRA-SPRINT-20-CHECKLIST.md
# Then populate the IDs below and uncomment bindings.

[env.staging]
name = "qesto-staging"
routes = [
  { pattern = "staging.qesto.cc/api/*", zone_name = "qesto.cc" }
]

[env.staging.vars]
ENV = "staging"
PAGES_URL = "https://staging.qesto.cc"
API_URL = "https://staging.qesto.cc"
CF_ACCESS_AUDIENCE = "0b2fa5d8bb22ac84a34705e0a077ea486cbad83611ca748a630aafdbbf34b9de"
CF_ACCESS_CERTS_URL = "https://ssolarnode.cloudflareaccess.com/cdn-cgi/access/certs"
COMMIT_SHA = "staging"
SAML_SP_ENTITY_ID = "https://staging.qesto.cc"
SAML_ACS_URL = "https://staging.qesto.cc/api/auth/saml/callback"
SUPERUSER_EMAIL = "oostelaar@hotmail.com"
SEED_ADMIN_EMAIL = "qesto@example.com"
CHECKOUT_URL = "https://checkout-staging.qesto.cc"
RESEND_FROM = "Qesto Staging <login@staging.qesto.cc>"
LIVE_ENERGIZERS_ENABLED = "true"
CIRCUIT_BREAKER_ENABLED = "true"
INTEGRATION_ENABLED = "1"
SENTIMENT_ENABLED = "true"
RATE_LIMIT_FAIL_CLOSED = "false"
WS_CONNECT_PER_IP_PER_MIN = "15"

# Staging D1 — provisioned with all migrations applied
[[env.staging.d1_databases]]
binding = "DB"
database_name = "qesto-staging"
