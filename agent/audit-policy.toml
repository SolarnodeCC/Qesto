# Jankurai audit policy — Qesto
# Schema: jankurai 1.6.10 (auditor reads this file only if it validates against
# schemas/audit-policy.schema.json). Field names migrated from the 1.5.x layout
# ([policy].score_floor → minimum_score) so the auditor applies THIS policy
# instead of silently falling back to defaults. Verified with `jankurai doctor`.
minimum_score = 85
fail_on = ["critical", "high"]
advisory_on = ["medium", "low"]
standard_version = "0.9.0"
auditor_version = "1.6.10"
schema_version = "1.9.0"
paper_edition = "2026.05-ed8"
target_stack = "rust-ts-vite-react-postgres-bounded-python"

[history]
max_rows = 500
max_bytes = 1048576
dedupe = "consecutive-equivalent"
mirror_required = false

# Hard-rule cap ceilings (canonical jankurai defaults — documented here so the
# rubric the repo is gated on is explicit and reviewable rather than implicit).
[caps]
no_root_agent_instructions = 75
no_one_command_setup_or_validation = 70
no_deterministic_fast_lane = 65
no_security_lane_on_high_risk_repo = 60
generated_contracts_or_public_api_drift_untested = 80
python_direct_product_truth_or_db_ownership = 72
no_secret_or_dependency_scanning_in_ci = 78
no_jankurai_audit_lane_in_ci = 82
non_optimal_product_language_found = 74
too_much_python_in_product_surface = 72
vibe_placeholders_in_product_code = 68
fallback_soup_in_product_code = 70
future_hostile_dead_language_in_product_code = 64
severe_duplication_in_product_code = 70
generated_zone_mutation_risk = 76
direct_db_access_from_wrong_layer = 66
missing_web_e2e_lane = 82
missing_rendered_ux_qa_lane = 84
prompt_injection_risk = 78
overbroad_agent_agency = 65
secret_like_content_detected = 60
false_green_test_risk = 76
destructive_migration_risk = 70
missing_rust_property_or_integration_tests = 82
no_agent_friendly_exception_pattern = 76
missing_agent_readable_docs = 80
streaming_runtime_drift = 78

# Opt-in HLT-001 allowlist (jankurai 1.6.10). These terms are legitimate,
# reviewed vocabulary in this stack, NOT future-hostile dead-language markers:
#   placeholder — the HTML/React `placeholder=` input attribute
#   stub        — the Cloudflare Durable Object `stub` (env.SESSION_ROOM.get(stub))
#   fallback    — intentional graceful-degradation branches
#   deprecated  — explicit deprecation markers on superseded fields/routes
#   stale       — cache-staleness semantics (SWR / KV revalidation)
[dead_language]
allow_terms = ["placeholder", "stub", "fallback", "deprecated", "stale"]

[limits]
# Qesto is a TypeScript/React + Hono-on-Workers repo (no Rust/Python product
# surface). Component/file ceilings match the canonical reference profile.
rust_file_hard = 350
typescript_component_hard = 280
python_ai_file_hard = 300
function_hard = 70
agent_instruction_hard = 180
design_doc_hard = 600

[scan]
# Generated artifacts and vendored code excluded from scoring.
excluded_paths = [
  "target/",
  "dist/",
  "node_modules/",
  ".wrangler/",
  "coverage/",
  "agent/baselines/",
  "contracts/generated/",
]
# Generated GitHub Actions lock file (linguist-generated=true per .gitattributes)
# and other generated artifacts that must not be hand-audited.
extra_excluded_paths = [
  ".github/workflows/daily-repo-status.lock.yml",
  # Design-system reference kit: standalone HTML/JS/CSS preview scaffolds and UI
  # kits under design-system/ (templates/*/support.js, ui_kits/*.js, etc.).
  # Reference artifacts, not product runtime code — not imported by src/ or
  # functions/. Excluded from product-code scoring like contracts/generated/ and
  # dist/. (The shipped design system lives in src/ and uses CSS custom-property
  # tokens per ADR-0071.)
  "design-system/",
  # Published Python client SDK — a client library, not the exception-only
  # AI/data service the target stack scopes Python to. Not product runtime.
  "packages/sdk-python/",
  # E2E demo-seed fixture: contains a throwaway demo password used only to seed
  # showcase data in Playwright runs. Not a real credential.
  "tests/e2e/marketing/demo-data.ts",
]
# gh-aw compiles *.lock.yml workflow files; they are generated output, not
# hand-authored CI, so they are excluded from bad-behavior scanning.
extra_excluded_globs = [
  "**/*.lock.yml",
]
