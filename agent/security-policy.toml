# Jankurai security-lane policy — Qesto
# Schema: jankurai 1.6.10 (schemas/security-policy.schema.json). Migrated from the
# 1.5.x [policy]/[[required]]/[[advisory]] layout; the auditor only honours this
# file when it carries schema_version and the flat tool lists below.
#
# Qesto is a TypeScript/Cloudflare repo: npm is the real dependency audit;
# cargo-* tools are not applicable (no Rust product surface) and are omitted.
schema_version = "1.0.0"

enabled_tools = [
  "npm",
  "gitleaks",
  "syft",
  "zizmor",
]

required_tools = [
  "npm",
]

advisory_tools = [
  "gitleaks",
  "syft",
  "zizmor",
]

[severity_thresholds]
fail_lane_on = "high"

[profiles.local]
enabled_tools = ["npm", "gitleaks", "syft", "zizmor"]
required_tools = ["npm"]
advisory_tools = ["gitleaks", "syft", "zizmor"]

[profiles.ci]
enabled_tools = ["npm", "gitleaks", "syft", "zizmor"]
required_tools = ["npm", "gitleaks"]
advisory_tools = ["syft", "zizmor"]

[profiles.release]
enabled_tools = ["npm", "gitleaks", "syft", "zizmor"]
required_tools = ["npm", "gitleaks", "syft"]
advisory_tools = ["zizmor"]
