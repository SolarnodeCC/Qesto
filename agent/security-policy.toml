[policy]
standard = "jankurai"
version = "1.5.1"

# Required tools — CI fails if these are missing
[[required]]
tool = "npm"
command = "npm audit --audit-level=high"
reason = "dependency vulnerability scan"

# Advisory tools — CI warns but does not fail if not installed
[[advisory]]
tool = "gitleaks"
command = "gitleaks detect --source . --redact --no-banner"
reason = "secret detection"

[[advisory]]
tool = "syft"
command = "syft . -o spdx-json=target/jankurai/sbom.spdx.json"
reason = "SBOM generation"

[[advisory]]
tool = "zizmor"
command = "zizmor .github/workflows"
reason = "GitHub Actions security audit"
